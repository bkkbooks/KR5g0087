front:
  text: 洞玄靈寳五感文笙五
  hash: sha256:3019005fc3f170bc87a5f53d02027a02f5affdeeb7b55fed72420cdfdc1af14c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0087_SJB_000-320618c, image: sjb/32/320618c.png}
body:
  text: 陸脩靜集此五感之文乃是道士修六齋之法皆出三洞大經尊貴妙重不可穢慢若看之者皆洗手著淨巾上蓄之者必著器中不得輕慢輕慢者必被天殃至道清虚法典簡素恬寂無爲此其本也而世物浮僞鮮能體行競髙流淫信用妖妄倚附邪魅假託眞正君子小人相與逐往昏迷長寢曽莫甄悟致上危神器下傾百姓滅身破國猶不以戒至乃濁亂正炁㸃染清眞毁辱大道可爲痛酷余生值末世敎法綱頽人皆趣彼而我竊守此法甚日損歸根食母卷志謝芳潔之聲開懷受麈垢之汚乞免分競之斧斤請保無用以自足旣閑且宴逍遥永日研經翫理時修功德以癸巳年冬擕率門人建三元塗炭齋科禁旣重積旬累月負戴霜露足冰首泥時值隂雨衣裳霑濡勁風振厲嚴寒切肌忍苦從法不敢虧替素各羸冷慮有怠懈乃說五感以相勸慰井統序衆齋標題門戸均塗異轍粗爲詳辯豈曰務誇數十同志信好之士幸鑒之哉若塗炭齋者無五感之心不得勸吾之意一則費香徒勞二則成於虚誑三則輕慢法禁四則毀辱師敎五則更招罪罰一感父母生我育我鞠我養我出懷入抱嘯含摩牧勞心損體辛苦憂勤我或不夷時有疾病則愁我念我心如炙焚夙夜怵愓忘金失眠増感憔悴泣涕漣漣願成願長我得如今念此重恩不可稱量誓心上答昊天罔極二感父母爲我冠帶婚娶積蓄貲財造買基業苟欲我多不覺貪濫與物求競動生怨恡致有愆尤或至無狀觸忤天地傷害人物或外犯王法内犯冥科或刑罰所加及於性命縁起有我以招斯患今落三塗嬰罹衆難循於劔樹墮於刀山履於炎火鑊湯之熱没於幽夜冰凍之寒或懸在笞押撾杖之下千痛萬楚不可堪當悲惱憂厄時刻難忍希望免脫無由自濟念此崩哽肝心潰亂五體戰懐形魂失措不覺投地塗炭乞哀三感普天之下貴賤男女皆受人身身口之累有生所重食則五味衣則五綵旣飽旣暖不復自裁服玩奢豪恣情快意追逐營求無有厭足傷神害身永不自覺氣命旣凋形體朽爛平生觸物竟復何用孤瑰獨逝遍受諸苦誠此冥昧非世所了而餘財四散方爲後患生奸起盜子孫所爭强者克多弱者獲少與奪失得更相忿恨或告訟官司又被裁戮或稱訴神鬼隂受凶禍骨肉之親共構架讎天屬之重棄若遺土孔懷之愛自競錐刀身滅家殘釁由貪奢悠悠一切相與淪没未曽有悟悟不能捨過去皆爾來者復然遂用爲常甘心無恨我識此非故背當世委離六親遺榮遺累尋道求生積學自濟能及有益先報我親平素之日鞠育之恩今獲神丹以濟沉溺登此法橋度彼絶岸悲喜踊躍五情飛越心馳神往忽忘四體不覺捨我歸命三寳罄竭資財奉充法用唯懼弗及更無遺恡願我父母上昇福堂長免八難無復憂惱庶此微誠以備供養四感太上衆尊大聖眞人開此大化出斯妙法拯拔三塗接濟五道億曽萬祖積劫殃對一旦釋然幽魂苦爽超昇福堂因縁種族咸受慶惠我身得道後世蒙福此恩希有萬劫一出旣得遭遇竭命奉行傾心盡節故無懈怠五感我獲此福事有所由因縁開度使我見者我師之恩仰戴罔極有過天地故行道之日毎至懇禱冀有微功上酬仁德身困體疲不敢有辭我得此法懽喜無量有若貪夫遇金玉藏衆人不知唯我獨見伏身潜嘿肆力採掘積日累月無有猒極唯恐寳盡不以爲勞負霜戴雪渉水踐冰凍身切骨不覺爲寒﨑嶇嶮巇不以爲難心怡情恱故無所惑衆齋法道以齋戒爲立德之根本㝷眞之門戸學道求神仙之人祈福希慶祚之家萬不由之旣子識有明闇則入悟有利鈍資力有優劣則所任有多少是以聖人階其精麤分析轍轍大體九等齋各有法凡十二法一曰洞眞上清之齋有二法其一法絶羣離偶捨朋犮之交無妻奴之黒狐相獨宴泊然窮寂形影相對無爲爲偶端推好然無所一爲胎息後梘心所神機寂胃冐以受食爲有事旣虚息不食則泊然寂定也虚申請齋以咠爲期至申而食今旣不食徒有此中虚過而巳眠神神司外務蹂動今旣無事怡靜内藏故謂之眠靜炁炁者體之化神之舜神動則炁奔今神遂内後則炁靜體寧神遺形忘體形以有待故椄物體之以有累不可忘今内無飢寒之切外無纏纏之累洞遂虐漠故不知四大之所在也無與道合道體虚无我有故隔今旣能忘所以玄合其二法孤影夷豁皆與上同伹混合形神諷經有異二曰洞玄靈寳之齋有九法以有爲爲宗某徒衆盛典儀仰有節進退有度威威月齋軌範洋洋振揚法音開化訪物使求楫者聞來見者見恢廓弘徫難可備言其一法金籙齋調和隂陽救度國正法於簬地玄壇廣三犬二天瀾纂四而開四爲用合一門又於壇内立重壇廣二丈四天開四角上下爲十門各有榜題於壇中央女一長燈長九尺上安九燈火圍壇四面安色燈合三十六燈壇外欲燃千百隨人也書五方天文以五案盛之五方金龍五枚枚重一兩以鎭天文之上方一香火文用五色紋繒隨方疋數都合三十六之道士結衆行道春則九日夏則三日秋則七日冬則五日四季之月十二日一日六日仕射十方事竟焚天文散龍繒爲功德也其二法黄籙齋爲同法抜九祖罪根法亦立壇廣狹門戸與金籙同但圍壇四面安力十燈十門三香火十方紋繒之信庶人一百三十六尺諸侯丈數天子疋數金龍十枚枚重一兩金有上中下爲貴賤之差行道禮謝二十方日數如金籙隨四時之制事竟投龍於水又埋於山餘紋繒散爲功德也其三法明眞齋學士自拔億曾萬祖九幽之魂法亦於露地然一長燈上有九大如金籙燈法但不立壇門戸之式耳遶香燈行道一日一夜六時禮謝十方其四法三元齋學士一年三過自謝渉學犯戒之罪法以正月七月十月皆用月半日一日三時沐浴三時行道於齋堂中禮謝二十一方也其五法八節齋學士一年八過謝七玄及已身宿世今生之罪法以八節日於齋堂内六時行道禮謝十方也其六法自然齋普濟之法内以修身外以救物消災祈福適意所宜法亦結徒衆亦可一身禮謝十方亦一日三日亦百日千日亦可三時亦可六時其七法洞神三皇之齋以精簡爲上單已爲偶絶塵期靈沐浴玄雲之水燒皇上之香燃玄液之燭服上元香丸合衆名香各有分數䒱錬爲香珠青絲穿連暴今乾又以衆香前油爲香又作香湯沐浴又和作香九服之皆有節度然三十六油燈又安三十六香鑪以相開次侍燈待香晝夜不輟或百日四十日注心宻念燭燈行香呪願清眞妙辭凡三十二言欲召神祗盡皇文召之所召所問求仙求生在意所欲其八法太一之齋以恭肅爲首皆契同潔巳勵志施爲唯法不雜異學跪拜揖讓同法磬折盡節也其九法指敎之齋以清素爲貴祭酒籙生共應用隨巨細無苦時遭飢食唯菜蔬向王之菜則不得噉中食之後水不過齒思經念道不替須㬰又曰三元塗炭之齋以苦節爲功上解億曽道祖無數劫來宗親門族及已身家門無鞅數罪拯拔憂苦濟人危厄其功至重不可稱量法於露地立壇安攔格齋人皆結同氣賢者悉以黄土泥額被髪繫著欄格反手自縛口中銜璧覆臥於地開兩脚相去三尺叩頭懴謝晝三時向西夜三時向北齋有上中下三元相連一元十二日合三十六日下元限竟進中元十二日内加三過方謝中元竟進上元十二日内加五過方謝於謝者向上下中中四面四角中一方謝増爲苦劇所以名三元者元則數之始也一年有十二月三百六十日十日爲一旬月有三旬旬有上中下十二月合三十六旬斯則十分之一分爲三元一元十二日是十二時一周也洞玄靈寳五感文
