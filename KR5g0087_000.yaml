front:
  text: 洞玄靈寶五感文笙五
  hash: sha256:e6d471aa027658f4e4d749e0dc2082a9fab17b182bdfbfa4c2c0ca6671ec4213
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0087_HFL_000-001a, image: hfl/1004/1004-132.png}
body:
  text: 陸修靜集此五感之文乃是道士修六齊之法皆出三洞大經尊貴妙重不可穢慢若看之者皆洗手著淨巾上蓄之者必著器中不得輕慢輕慢者必被天殃至道清虛法典簡素恬寂無為此其本也而世物浮僞鮮能體行競髙流淫信用妖妄倚附邪魅假託真正君子小人相與逐往昏迷長寢曽莫甄悟致上危神器下傾百姓滅身破國猶不以戒至乃濁亂正氣㸃染清真毁辱大道可為痛酷余生值末世教法綱頽人皆趣彼而我竊守此法甚日損歸根食母卷志謝芳潔之聲開懷受麈垢之汚乞免分競之斧斤請保無用以自足既間且宴逍遙永日研經玩理時修功德以癸巳年冬擕率門人建三元塗炭齊科禁既重積旬纍月負戴霜露足冰首泥時值隂雨衣裳霑濡徑風振厲嚴寒切肌忍苦從法不敢虧替素各羸冷慮有怠懈乃說五感以相勸慰井統序衆齊標題門戶均塗異轍粗為詳辨豈曰務誇數十同志信好之士幸鑒之哉若塗炭齊者無五感之心不得勸吾之意一則費香徒勞二則成於虛誑三則輕慢法禁四則毀辱師教五則更招罪罰一感父母生我育我鞠我養我出懷入抱嘯含摩牧勞心損體辛苦憂勤我或不夷時有疾病則愁我念我心如炙焚夙夜怵愓忘金失眠增感憔悴泣涕漣漣願成願長我得如今念此重恩不可稱量誓心上答昊天罔極二感父母為我冠帶婚娶積蓄資財造買基業苟欲我多不覺貪濫與物求競動生怨吝致有愆尤或至無狀觸忤天地傷害人物或外犯王法內犯冥科或刑罰所加及於性命緣起有我以招斯患今落三塗嬰罹衆難循於劔樹墮於刀山履於炎火鑊湯之熱沒於幽夜冰凍之寒或懸在笞押撾杖之下千痛萬楚不可堪當悲惱憂厄時刻難忍希望免脫無由自濟念此崩哽肝心潰亂五體戰懷形魂失措不覺投地塗炭乞哀三感普天之下貴賤男女皆受人身身口之纍有生所重食則五味衣則五綵既飽既暖不復自裁服玩奢豪恣情快意追逐營求無有厭足傷神害身永不自覺氣命既凋形體朽爛平生觸物竟復何用孤瑰獨逝遍受諸苦誠此冥昧非世所了而餘財四散方為後患生奸起盜子孫所爭强者克多弱者獲少與奪失得更相忿恨或告訟官司又被裁戮或稱訴神鬼隂受凶禍骨肉之親共構架讎天屬之重棄若遺土孔懷之愛自競錐刀身滅家殘釁由貪奢悠悠一切相與淪沒未曽有悟悟不能捨過去皆爾來者復然遂用為常甘心無恨我識此非故背當世委離六親遺榮遺纍尋道求生積學自濟能及有益先報我親平素之日鞠育之恩今獲神丹以濟沉溺登此法橋度彼絶岸悲喜踊躍五情飛越心馳神往忽忘四體不覺捨我歸命三寶罄竭資財奉充法用唯懼弗及更無遺吝願我父母上升福堂長免八難無復憂惱庶此微誠以備供養四感太上衆尊大聖真人開此大化出斯妙法拯拔三塗接濟五道億曽萬祖積劫殃對一旦釋然幽魂苦爽超升福堂因緣種族咸受慶惠我身得道後世蒙福此恩希有萬劫一出既得遭遇竭命奉行傾心盡節故無懈怠五感我獲此福事有所由因緣開度使我見者我師之恩仰戴罔極有過天地故行道之日每至懇禱冀有微功上酬仁德身困體疲不敢有辭我得此法歡喜無量有若貪夫遇金玉藏衆人不知唯我獨見伏身潜默肆力採掘積日纍月無有猒極唯恐寶盡不以為勞負霜戴雪涉水踐冰凍身切骨不覺為寒﨑嶇嶮巇不以為難心怡情恱故無所惑衆齊法道以齊戒為立德之根本尋真之門戶學道求神仙之人祈福希慶祚之家萬不由之既子識有明暗則入悟有利鈍資力有優劣則所任有多少是以聖人階其精粗分析轍轍大體九等齊各有法凡十二法一曰洞真上清之齊有二法其一法絶羣離偶捨朋犮之交無妻奴之黑狐相獨宴泊然窮寂形影相對無為為偶端推好然無所一為胎息後梘心所神機寂胃冒以受食為有事既虛息不食則泊然寂定也虛申請齊以咠為期至申而食今既不食徒有此中虛過而巳眠神神司外務蹂動今既無事怡靜內藏故謂之眠靜氣氣者體之化神之舜神動則氣奔今神遂內後則氣靜體寧神遺形忘體形以有待故椄物體之以有纍不可忘今內無飢寒之切外無纏纏之纍洞遂虐漠故不知四大之所在也無與道合道體虛無我有故隔今既能忘所以玄合其二法孤影夷豁皆與上同伹混合形神諷經有異二曰洞玄靈寶之齊有九法以有為為宗某徒衆盛典儀仰有節進退有度威威月齊軌範洋洋振揚法音開化訪物使求楫者聞來見者見恢廓弘徫難可備言其一法金籙齊調和隂陽救度國正法於簬地玄壇廣三犬二天瀾纂四而開四為用合一門又於壇內立重壇廣二丈四天開四角上下為十門各有榜題於壇中央女一長燈長九尺上安九燈火圍壇四面安色燈合三十六燈壇外欲燃千百隨人也書五方天文以五案盛之五方金龍五枚枚重一兩以鎮天文之上方一香火文用五色紋繒隨方匹數都合三十六之道士結衆行道春則九日夏則三日秋則七日冬則五日四季之月十二日一日六日仕射十方事竟焚天文散龍繒為功德也其二法黃籙齊為同法拔九祖罪根法亦立壇廣狹門戶與金籙同但圍壇四面安力十燈十門三香火十方紋繒之信庶人一百三十六尺諸侯丈數天子匹數金龍十枚枚重一兩金有上中下為貴賤之差行道禮謝二十方日數如金籙隨四時之制事竟投龍於水又埋於山餘紋繒散為功德也其三法明真齊學士自拔億曾萬祖九幽之魂法亦於露地然一長燈上有九大如金籙燈法但不立壇門戶之式耳繞香燈行道一日一夜六時禮謝十方其四法三元齊學士一年三過自謝涉學犯戒之罪法以正月七月十月皆用月半日一日三時沐浴三時行道於齊堂中禮謝二十一方也其五法八節齊學士一年八過謝七玄及已身宿世今生之罪法以八節日於齊堂內六時行道禮謝十方也其六法自然齊普濟之法內以修身外以救物消災祈福適意所宜法亦結徒衆亦可一身禮謝十方亦一日三日亦百日千日亦可三時亦可六時其七法洞神三皇之齊以精簡為上單已為偶絶塵期靈沐浴玄雲之水燒皇上之香燃玄液之燭服上元香丸合衆名香各有分數䒱錬為香珠青絲穿連暴今乾又以衆香前油為香又作香湯沐浴又和作香九服之皆有節度然三十六油燈又安三十六香爐以相開次侍燈待香晝夜不輟或百日四十日注心密念燭燈行香呪願清真妙辭凡三十二言欲召神祗盡皇文召之所召所問求仙求生在意所欲其八法太一之齊以恭肅為首皆契同潔巳勵志施為唯法不雜異學跪拜揖讓同法磬折盡節也其九法指教之齊以清素為貴祭酒籙生共應用隨巨細無苦時遭飢食唯菜蔬向王之菜則不得噉中食之後水不過齒思經念道不替須㬰又曰三元塗炭之齊以苦節為功上解億曽道祖無數劫來宗親門族及已身家門無鞅數罪拯拔憂苦濟人危厄其功至重不可稱量法於露地立壇安攔格齊人皆結同氣賢者悉以黃土泥額被髮繫著欄格反手自縛口中銜璧覆臥於地開兩腳相去三尺叩頭懴謝晝三時向西夜三時向北齊有上中下三元相連一元十二日合三十六日下元限竟進中元十二日內加三過方謝中元竟進上元十二日內加五過方謝於謝者向上下中中四面四角中一方謝增為苦劇所以名三元者元則數之始也一年有十二月三百六十日十日為一旬月有三旬旬有上中下十二月合三十六旬斯則十分之一分為三元一元十二日是十二時一周也洞玄靈寶五感文
